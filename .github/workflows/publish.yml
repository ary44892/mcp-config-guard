name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-config-guard/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check if version already on PyPI
        id: check
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\\\"(.+?)\\\"', open('pyproject.toml').read()).group(1))")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/mcp-config-guard/$VERSION/json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already on PyPI — skipping upload"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not on PyPI — will upload"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.exists == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
